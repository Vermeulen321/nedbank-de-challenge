# Data Quality Rules
# Read by transform.py to apply DQ flagging to transactions.
# Keeping logic here (not hardcoded in Python) allows Stage 2/3
# to tighten or relax rules without touching pipeline code.

# Fields that must not be null.
# Violation → dq_flag = "NULL_REQUIRED" (transactions) or record excluded (accounts)
null_checks:
  transactions:
    - transaction_id
    - account_id
    - transaction_date
    - transaction_type
    - amount

# Primary key null checks — records with null PK are excluded from Silver/Gold entirely.
# Violation → EXCLUDED_NULL_PK (logged in dq_report, not flagged in dq_flag column)
null_pk_checks:
  accounts: account_id

# Handling actions for dq_report.json (Stage 2+).
# Maps issue_type keys (used in dq_report) to their handling action strings.
# The scoring harness cross-references these against dq_report.json.
handling_actions:
  duplicate_transactions: DEDUPLICATED_KEEP_FIRST
  orphaned_transactions: QUARANTINED
  amount_type_mismatch: CAST_TO_DECIMAL
  date_format_inconsistency: NORMALISED_DATE
  currency_variants: NORMALISED_CURRENCY
  null_account_id: EXCLUDED_NULL_PK

# Type-mismatch detection.
# `amount` arrives as a JSON string (e.g. "349.50") in ~3% of Stage 2
# transactions. Detected at ingest via regex on the raw line; flagged in
# Silver as dq_flag=TYPE_MISMATCH; cast to DECIMAL(18,2) and retained.
type_checks:
  amount:
    expected_type: numeric
    dq_flag: TYPE_MISMATCH

# Enumerated value domains per field. Reference only — values outside these
# domains are not explicitly flagged in Stage 2 (the spec reserves
# TYPE_MISMATCH for the amount field). Listed here for documentation and
# future extension.
domain_checks:
  transaction_type:
    allowed: [DEBIT, CREDIT, FEE, REVERSAL]
  channel:
    allowed: [POS, APP, ATM, EFT, USSD, INTERNAL]

# Currency normalisation.
# Non-ZAR source values → dq_flag = "CURRENCY_VARIANT", then normalised to ZAR.
currency_normalisation:
  target_value: ZAR
  flag_variants: true

# Date fields that must parse as ISO YYYY-MM-DD.
# Unparseable value → dq_flag = "DATE_FORMAT"
date_format_checks:
  - transaction_date

# Referential integrity.
# Transaction referencing an account_id absent from silver accounts
# → dq_flag = "ORPHANED_ACCOUNT"
referential_integrity:
  transactions:
    - field: account_id
      references: accounts
      dq_flag: ORPHANED_ACCOUNT
